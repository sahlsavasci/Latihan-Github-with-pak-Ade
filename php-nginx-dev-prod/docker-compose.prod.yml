services:
  app:
    image: ghcr.io/example/php-nginx-app:latest
    container_name: sample_app_prod
    environment:
      APP_ENV: production
    volumes:
      - public_data:/var/www/html/public
      - storage_data:/var/www/html/storage
    networks:
      - app_network
      - shared_web_network
    restart: unless-stopped

  web:
    image: nginx:alpine
    container_name: sample_web_prod
    ports:
      - "8088:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - public_data:/var/www/html/public:ro
    depends_on:
      - app
    networks:
      - app_network
      - shared_web_network
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: sample_db_prod
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sample_app
      MYSQL_USER: sample_user
      MYSQL_PASSWORD: sample_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_network
    restart: unless-stopped

networks:
  app_network:
    driver: bridge
  shared_web_network:
    external: true

volumes:
  public_data:
  storage_data:
  db_data:
