services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: sample_app_dev
    user: "0:0" # karena host nya idnsolo bukan idnsolo_remote, maka user nya harus root (0:0)
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    networks:
      - app_network
    restart: unless-stopped

  web:
    image: nginx:alpine
    container_name: sample_web_dev
    user: "0:0" # karena host nya idnsolo bukan idnsolo_remote, maka user nya harus root (0:0)
    ports:
      - "8088:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./src:/var/www/html:ro
    depends_on:
      - app
    networks:
      - app_network
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: sample_db_dev
    user: "0:0" # karena host nya idnsolo bukan idnsolo_remote, maka user nya harus root (0:0)
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sample_app
      MYSQL_USER: sample_user
      MYSQL_PASSWORD: sample_password
    ports:
      - "3309:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_network
    restart: unless-stopped

networks:
  app_network:
    driver: bridge

volumes:
  db_data:
